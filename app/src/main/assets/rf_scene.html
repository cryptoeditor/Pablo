<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link href="maplibre-gl.css" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:transparent;}
  #map{position:absolute;top:0;bottom:0;left:0;right:0;}
  #toggle{position:absolute;top:10px;right:10px;z-index:5;
    font:600 13px sans-serif;padding:8px 14px;border:none;border-radius:18px;
    background:rgba(33,45,80,0.88);color:#fff;}
  #err{color:#b00;font:13px sans-serif;padding:10px;}
</style>
</head>
<body>
<div id="map"></div>
<button id="toggle">3D</button>
<script src="maplibre-gl.js"></script>
<script>
(function(){
  var mapDiv=document.getElementById('map');
  if(!window.maplibregl){mapDiv.innerHTML='<div id="err">MapLibre failed to load</div>';return;}

  var CENTER=[-122.4194,37.7749];
  function mkField(name,color,bearing,dist,strength,seed){
    var br=bearing*Math.PI/180;
    var lat=CENTER[1]+dist*Math.sin(br);
    var lng=CENTER[0]+dist*Math.cos(br)/Math.cos(CENTER[1]*Math.PI/180);
    return {name:name,color:color,lng:lng,lat:lat,baseR:0.0011+strength*0.003,height:200+strength*900,seed:seed};
  }
  var fields=[
    mkField('Alpha','#2E9E5B',35,0.004,0.9,0.0),
    mkField('Bravo','#E0A000',120,0.006,0.7,1.7),
    mkField('Charlie','#E0701A',205,0.007,0.55,3.1),
    mkField('Delta','#C2453F',300,0.009,0.4,4.6)
  ];

  function buildRing(f,t){
    var N=48,ring=[],latR=f.lat*Math.PI/180,i;
    for(i=0;i<=N;i++){
      var th=i/N*Math.PI*2;
      var r=f.baseR*(1+0.25*Math.sin(3*th+f.seed+t)+0.16*Math.sin(5*th-f.seed+t*0.7)+0.10*Math.sin(7*th+t*0.5));
      var dLng=r*Math.cos(th)/Math.cos(latR), dLat=r*Math.sin(th);
      ring.push([f.lng+dLng, f.lat+dLat]);
    }
    return ring;
  }

  function kmlColor(hex,alpha){
    var a=('0'+alpha.toString(16)).slice(-2);
    return a+hex.substr(5,2)+hex.substr(3,2)+hex.substr(1,2);
  }
  function genKml(list,t){
    var s='<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document>';
    list.forEach(function(f){
      var ring=buildRing(f,t);
      var coords=ring.map(function(p){return p[0].toFixed(6)+','+p[1].toFixed(6)+',0';}).join(' ');
      s+='<Placemark><name>'+f.name+'</name>';
      s+='<Style><PolyStyle><color>'+kmlColor(f.color,0x66)+'</color><fill>1</fill><outline>1</outline></PolyStyle></Style>';
      s+='<ExtendedData><Data name="color"><value>'+f.color+'</value></Data><Data name="height"><value>'+Math.round(f.height)+'</value></Data></ExtendedData>';
      s+='<Polygon><extrude>1</extrude><altitudeMode>relativeToGround</altitudeMode><outerBoundaryIs><LinearRing><coordinates>'+coords+'</coordinates></LinearRing></outerBoundaryIs></Polygon>';
      s+='</Placemark>';
    });
    s+='</Document></kml>';
    return s;
  }

  function kmlToGeoJSON(kml){
    var doc=new DOMParser().parseFromString(kml,'application/xml');
    function tags(el,name){return el.getElementsByTagNameNS('*',name);}
    var pms=tags(doc,'Placemark'), feats=[], i, j;
    for(i=0;i<pms.length;i++){
      var pm=pms[i];
      var ce=tags(pm,'coordinates')[0];
      if(!ce)continue;
      var ring=ce.textContent.trim().split(/\s+/).map(function(c){var a=c.split(',');return [parseFloat(a[0]),parseFloat(a[1])];});
      var color='#888888', height=200, datas=tags(pm,'Data');
      for(j=0;j<datas.length;j++){
        var nm=datas[j].getAttribute('name');
        var v=tags(datas[j],'value')[0];
        v=v?v.textContent:'';
        if(nm==='color')color=v;
        if(nm==='height')height=parseFloat(v)||200;
      }
      feats.push({type:'Feature',properties:{color:color,height:height},geometry:{type:'Polygon',coordinates:[ring]}});
    }
    return {type:'FeatureCollection',features:feats};
  }

  var map=new maplibregl.Map({
    container:'map',
    style:{version:8,
      sources:{osm:{type:'raster',tiles:['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],tileSize:256,attribution:'© OpenStreetMap contributors'}},
      layers:[{id:'osm',type:'raster',source:'osm'}]},
    center:CENTER, zoom:13, pitch:50, bearing:-18
  });

  var t=0, lastKml='', intervalMs=15000, timer=null, mode='3d';
  var btn=document.getElementById('toggle');

  function updateFields(){
    t+=0.6;
    lastKml=genKml(fields,t);
    var src=map.getSource('rf');
    if(src)src.setData(kmlToGeoJSON(lastKml));
  }
  function startTimer(){ if(timer)clearInterval(timer); timer=setInterval(updateFields,intervalMs); }

  function applyMode(){
    if(map.getLayer('rf-fill'))map.setLayoutProperty('rf-fill','visibility',mode==='2d'?'visible':'none');
    if(map.getLayer('rf-extrude'))map.setLayoutProperty('rf-extrude','visibility',mode==='3d'?'visible':'none');
    map.easeTo({pitch:mode==='3d'?50:0,duration:400});
    btn.textContent=mode==='3d'?'3D':'2D';
  }
  btn.onclick=function(){ mode=(mode==='3d')?'2d':'3d'; applyMode(); };

  window.setMode=function(m){ mode=m; applyMode(); };
  window.setScanInterval=function(sec){ intervalMs=Math.max(1,sec)*1000; startTimer(); };
  window.exportKml=function(){ return lastKml; };

  map.on('load',function(){
    map.addSource('rf',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
    map.addLayer({id:'rf-fill',type:'fill',source:'rf',layout:{visibility:'none'},
      paint:{'fill-color':['get','color'],'fill-opacity':0.5,'fill-outline-color':['get','color']}});
    map.addLayer({id:'rf-extrude',type:'fill-extrusion',source:'rf',layout:{visibility:'visible'},
      paint:{'fill-extrusion-color':['get','color'],'fill-extrusion-opacity':0.7,'fill-extrusion-height':['get','height'],'fill-extrusion-base':0}});
    applyMode();
    updateFields();
    startTimer();
    setTimeout(function(){map.resize();},150);
  });

  window.addEventListener('resize',function(){map.resize();});
})();
</script>
</body>
</html>
